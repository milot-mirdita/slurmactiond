name: Build and Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: "${{ vars.USE_GITHUB_RUNNER != 'true' && fromJSON('[\"self-hosted\", \"slurm\"]') || 'ubuntu-latest' }}"
    container: "${{ vars.USE_GITHUB_RUNNER != 'true' && fromJSON('{\"image\": \"slurmactiond-build:1.64\", \"volumes\": [\"sccache:/sccache\"]}') || null }}"
    steps:
      - uses: actions/checkout@v4
      - name: Check Formatting
        run: cargo fmt --check --message-format short
      - name: Build (Debug)
        run: cargo build
      - name: Run Unit Tests
        run: cargo test
      - name: Build (Release)
        run: cargo build --release
      - name: Archive Release
        uses: actions/upload-artifact@v4
        with:
          name: Release
          path: target/release/slurmactiond